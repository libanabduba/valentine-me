<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For My Dearest Riski 💕</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Floating Hearts Background -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Audio -->
    <audio id="happyMusic" loop preload="auto">
      <source src="./resources/happy.mp3" type="audio/mpeg" />
    </audio>
    <audio id="sadMusic" loop preload="auto">
      <source src="./resources/sad.mp3" type="audio/mpeg" />
    </audio>

    <!-- ===== SCREEN 1: Welcome ===== -->
    <div class="screen active" id="welcomeScreen">
      <div class="screen-center">
        <div class="welcome-envelope" id="envelope">💌</div>
        <h1 class="welcome-title">Welcome, My Dearest Riski</h1>
        <h1 class="welcome-title">My Nural Ayn :)</h1>
        <div class="typewriter-wrap">
          <p class="welcome-sub" id="typewriterText"></p>
          <span class="cursor-blink">|</span>
        </div>
        <button class="btn btn-glow" id="openHeartBtn" onclick="showQuestion()" style="opacity: 0; pointer-events: none;">
          Open My Heart 💕
        </button>
      </div>
    </div>

    <!-- ===== SCREEN 2: Question ===== -->
    <div class="screen" id="questionScreen">
      <div class="screen-center">
        <h1 class="q-title" id="qTitle">Will You Be My Valentine? 🥺</h1>
        <img
          class="q-img"
          id="mainImg"
          src="./resources/happy1.gif"
          alt="cute gif"
        />
        <div class="btn-row" id="btnRow">
          <button class="btn btn-yes" id="yesBtn" onclick="sayYes()">
            Yes 🥰
          </button>
          <button class="btn btn-no" id="noBtn" onclick="sayNo()">
            No 😭
          </button>
        </div>
      </div>
    </div>

    <!-- ===== MODAL: Sad (No response) ===== -->
    <div class="modal-overlay" id="sadModal">
      <div class="modal-box">
        <p class="modal-title" id="sadText">Please 🥺</p>
        <img
          class="modal-gif"
          id="sadImg"
          src="./resources/sadCat.gif"
          alt="sad"
        />
        <div class="btn-row">
          <button class="btn btn-yes" onclick="sayYes()">Yes 🥰</button>
          <button class="btn btn-no btn-no-modal" id="noBtn2" onclick="sayNo()">
            No 😭
          </button>
        </div>
      </div>
    </div>

    <!-- ===== MODAL: Happy (Yes response) ===== -->
    <div class="modal-overlay" id="happyModal">
      <div class="modal-box happy">
        <p class="modal-title">I Love You So Much! 😘💕</p>
        <img class="modal-gif" src="./resources/happy3.gif" alt="happy" />
        <button class="btn btn-yes" onclick="goToCelebration()">
          I Love You Too 🥰
        </button>
      </div>
    </div>

    <!-- ===== Loading Overlay ===== -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-box">
        <div class="loading-heart">💕</div>
        <p class="loading-text">Preparing something special…</p>
      </div>
    </div>

    <!-- ===== SCREEN 3: Celebration 1 — Scrolling Grid ===== -->
    <div class="screen" id="celebScreen1">
      <div class="scroll-grid" id="scrollGrid">
        <!-- JS populates rows -->
      </div>
      <div class="celeb-overlay">
        <h1 class="celeb-title">You &amp; Me, Forever 💕</h1>
        <button class="btn btn-glow celeb-btn" onclick="goToCelebration2()">
          More Love 💖
        </button>
      </div>
    </div>

    <!-- ===== SCREEN 4: Celebration 2 — Photo Cascade ===== -->
    <div class="screen" id="celebScreen2">
      <div class="cascade-container" id="cascadeContainer">
        <!-- JS populates -->
      </div>
      <div class="celeb-overlay">
        <h1 class="celeb-title">Happy Valentine's Day, My Love 💝</h1>
        <p class="celeb-sub">
          Every single moment with you is my favourite moment ✨
        </p>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
